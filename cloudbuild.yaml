steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/dial-haven/rb-bridge:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/dial-haven/rb-bridge:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rb-bridge
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/dial-haven/rb-bridge:$COMMIT_SHA
      - --region
      - us-central1
      - --quiet

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/dial-haven/rb-bridge:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
